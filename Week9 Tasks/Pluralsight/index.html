<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Sluralpright</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Stack+Sans+Text:wght@200..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="wrapper">
      <div id="left">
        <div id="signIn">
          <div class="logo">
            <img
              src="PS-horizontal-color-fill-white-text.png"
              alt="SluralPright"
            />
          </div>
          <form>
            <div>
              <label>Email or Username</label>
              <input type="text" class="text__input" />
            </div>
            <div>
              <label>Password</label>
              <input type="Password" class="text__input" />
            </div>
            <button type="submit" class="primary__btn">Sign In</button>
          </form>
          <div class="links">
            <a href="#" class="link">Forgot Password</a>
            <a href="#" class="link">Sign In with Company or School</a>
          </div>
          <div class="or">
            <hr class="bar" />
            <span>OR</span>
            <hr class="bar" />
          </div>
          <a href="#" class="secondary__btn">Create an account</a>
        </div>
        <footer id="main__footer">
          <p>Copyright &copy; 2026, Pluralsight All Right Reserved</p>
          <div>
            <a href="#">Terms of use</a>|
            <a href="#">Privacy policy</a>
          </div>
        </footer>
      </div>
      <div id="right">
        <div id="showcase">
          <div class="showcase__content">
            <h1 class="showcase__text">
              Let's create the future <strong>together</strong>
            </h1>
            <a href="#" class="secondary__btn">Start a FREE 10-day trial</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
